version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: rna-neo4j
    ports:
      - "127.0.0.1:7887:7687"
      - "127.0.0.1:7576:7474"
    environment:
      NEO4J_AUTH: ${RNA_NEO4J_AUTH:-none}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rna-qdrant
    ports:
      - "127.0.0.1:6555:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "grep -i :18BD /proc/net/tcp || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  rna-postgres:
    image: postgres:15-alpine
    container_name: rna-postgres
    ports:
      - "127.0.0.1:5543:5432"
    environment:
      POSTGRES_USER: ${RNA_POSTGRES_USER:-rna_admin}
      POSTGRES_PASSWORD: ${RNA_POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${RNA_POSTGRES_DB:-rna_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RNA_POSTGRES_USER:-rna_admin} -d ${RNA_POSTGRES_DB:-rna_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  redis:
    image: redis:7-alpine
    container_name: rna-redis
    ports:
      - "127.0.0.1:6599:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  minio:
    image: minio/minio:latest
    container_name: rna-minio
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    environment:
      MINIO_ROOT_USER: ${RNA_MINIO_ROOT_USER:-rna_admin}
      MINIO_ROOT_PASSWORD: ${RNA_MINIO_ROOT_PASSWORD:-change_me}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rna-api
    restart: always
    ports:
      - "127.0.0.1:3007:3005"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${RNA_API_PORT:-3005}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: ${RNA_DATABASE_URL:-postgresql://rna_admin:change_me@rna-postgres:5432/rna_db}
      REDIS_URL: ${RNA_REDIS_URL:-redis://redis:6379}
      NEO4J_URI: ${RNA_NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${RNA_NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${RNA_NEO4J_PASSWORD:-}
      QDRANT_URL: ${RNA_QDRANT_URL:-http://qdrant:6333}
      MINIO_ENDPOINT: ${RNA_MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${RNA_MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${RNA_MINIO_ACCESS_KEY:-rna_admin}
      MINIO_SECRET_KEY: ${RNA_MINIO_SECRET_KEY:-change_me}
    networks:
      - rna-net
      - bcode_gateway

networks:
  rna-net:
    driver: bridge
  bcode_gateway:
    external: true

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
  redis_data:
  minio_data:
