version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: rna-neo4j
    ports:
      - "127.0.0.1:7887:7687" # Bolt (SIA uses 7689)
      - "127.0.0.1:7576:7474" # HTTP (SIA uses 7476)
    environment:
      NEO4J_AUTH: none
      NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rna-qdrant
    ports:
      - "127.0.0.1:6555:6333" # (SIA uses 6336, Silhouette uses 6444)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  postgres:
    image: postgres:15-alpine
    container_name: rna-postgres
    ports:
      - "127.0.0.1:5543:5432" # (Default 5432 might be in use)
    environment:
      POSTGRES_USER: rna_admin
      POSTGRES_PASSWORD: rna_password_2026
      POSTGRES_DB: rna_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rna_admin -d rna_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  redis:
    image: redis:7-alpine
    container_name: rna-redis
    ports:
      - "127.0.0.1:6599:6379" # (SIA uses 6389, Silhouette uses 6499)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  minio:
    image: minio/minio:latest
    container_name: rna-minio
    ports:
      - "127.0.0.1:9100:9000" # API
      - "127.0.0.1:9101:9001" # Console
    environment:
      MINIO_ROOT_USER: rna_admin
      MINIO_ROOT_PASSWORD: rna_password_2026
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rna-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rna-api
    restart: always
    ports:
      - "127.0.0.1:3007:3005" # Host 3005 is busy, using 3007 for now
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://rna_admin:rna_password_2026@postgres:5432/rna_db
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: rna_admin
      MINIO_SECRET_KEY: rna_password_2026
    # Ports will be handled by NPM/Gateway later, for now we can expose it to host if needed
    # But handoff says: "No uses Puerto 3005 externo — RNA es localhost:3005 hasta que Codex configure Cloudflare"
    # Actually, NPM will need to reach it. If they share a network, it's easier.
    networks:
      - rna-net
      # - gateway_public # We need to know the gateway network name

networks:
  rna-net:
    driver: bridge

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
  redis_data:
  minio_data:
